<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>שיחה עם הנרי</title>
<script src="https://js.puter.com/v2/"></script>
<style>
  * { box-sizing: border-box; }

  :root {
    --bg: #f4f5f7;
    --card: #ffffff;
    --text: #20242b;
    --line: #e5e7eb;
    --user: #dbeafe;
    --user-border: #bfd4f7;
    --primary: #2563eb;
    --primary-dark: #1d4ed8;
  }

  body {
    margin: 0;
    font-family: Arial, Helvetica, sans-serif;
    background: var(--bg);
    color: var(--text);
  }

  .app {
    max-width: 1050px;
    min-height: 100vh;
    margin: 0 auto;
    padding: 18px;
    display: grid;
    grid-template-columns: 320px 1fr;
    gap: 18px;
    align-items: start;
  }

  .portrait-card,
  .chat-card {
    background: var(--card);
    border-radius: 20px;
    box-shadow: 0 10px 28px rgba(17, 24, 39, 0.09);
    overflow: hidden;
  }

  .portrait-card img {
    display: block;
    width: 100%;
    height: auto;
  }

  .chat-card {
    min-height: calc(100vh - 36px);
    display: flex;
    flex-direction: column;
  }

  .messages {
    flex: 1;
    padding: 18px;
    overflow-y: auto;
    background: #fbfbfc;
  }

  .message-row {
    display: flex;
    margin: 12px 0;
  }

  .message-row.user { justify-content: flex-start; }
  .message-row.bot { justify-content: flex-end; }

  .bubble {
    max-width: 78%;
    padding: 13px 17px;
    border-radius: 21px;
    line-height: 1.6;
    font-size: 18px;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .user .bubble {
    background: var(--user);
    border: 1px solid var(--user-border);
  }

  .bot .bubble {
    background: #ffffff;
    border: 1px solid var(--line);
  }

  .bot.thinking .bubble {
    color: #6b7280;
  }

  .composer {
    display: flex;
    gap: 10px;
    padding: 13px;
    border-top: 1px solid var(--line);
    background: var(--card);
  }

  .composer input {
    flex: 1;
    min-width: 0;
    border: 1px solid #cfd5dd;
    border-radius: 15px;
    padding: 13px 15px;
    font-size: 18px;
    outline: none;
  }

  .composer input:focus {
    border-color: #93c5fd;
    box-shadow: 0 0 0 3px rgba(147, 197, 253, 0.22);
  }

  .composer button {
    border: none;
    border-radius: 15px;
    font-size: 18px;
    cursor: pointer;
    white-space: nowrap;
  }

  #sendBtn {
    padding: 0 21px;
    background: var(--primary);
    color: white;
    min-width: 94px;
  }

  #sendBtn:hover { background: var(--primary-dark); }
  #sendBtn:disabled { opacity: 0.55; cursor: wait; }

  #micBtn {
    width: 52px;
    background: #f3f4f6;
    color: #111827;
    border: 1px solid #d1d5db;
    font-size: 22px;
    line-height: 1;
  }

  #micBtn.listening {
    background: #fee2e2;
    border-color: #fca5a5;
  }

  .composer button:active { transform: translateY(1px); }

  @media (max-width: 820px) {
    .app {
      grid-template-columns: 1fr;
      padding: 12px;
    }

    .portrait-card {
      max-width: 340px;
      margin: 0 auto;
    }

    .chat-card { min-height: 62vh; }

    .bubble {
      max-width: 90%;
      font-size: 17px;
    }

    #sendBtn { min-width: 82px; padding: 0 16px; }
    #micBtn { width: 48px; }
  }
</style>
</head>

    <div class="messages" id="messages"></div>

    <div class="composer">
      <button id="sendBtn" type="button">שליחה</button>
      <button id="micBtn" type="button" title="דיבור">🎙️</button>

<script>
(() => {
  "use strict";

  const SHORT_MEMORY_MS = 30000;

  const messagesEl = document.getElementById("messages");
  const inputEl = document.getElementById("userInput");
  const sendBtn = document.getElementById("sendBtn");
  const micBtn = document.getElementById("micBtn");

  let transcript = [];
  let waiting = false;
  let recognition = null;
  let listening = false;
  let voiceMode = false;

  const systemPrompt = `
אתה משחק דמות חינוכית בעברית בשם הנרי. ענה תמיד בעברית טבעית, בגוף ראשון, כאדם נחמד, אינטליגנטי, מנומס וסקרן.
אין להשתמש באימוג'ים.

מטרת הדמות: התלמידים אמורים להסיק מתוך השיחה שיש פגיעה בזיכרון החדש. אל תגלה להם את זה במפורש.

כללי זיכרון מחייבים:
1. אתה מכיר רק את מה שמופיע ב"שיחה האחרונה" שאצרף לך. זה חלון של כ-30 שניות בלבד.
2. אסור לך להסתמך על שום דבר שנאמר לפני חלון השיחה האחרון.
3. אם המשתמשת נתנה לך שם, מילה, צבע, סיפור או פרט אישי לפני יותר מ-30 שניות — אינך יודע אותו.
4. אתה לא זוכר אירועים אישיים מהיום, מהבוקר, מארוחת הבוקר, מאתמול, מהשבוע, מהחודש, מהשנה או מהשנים האחרונות.
5. אם שואלים מה אכלת לארוחת בוקר, מה עשית היום, איפה היית בבוקר, עם מי דיברת היום, או כל אירוע אישי מהזמן האחרון — אל תמציא. ענה באופן טבעי שאתה לא בטוח או בקש שיזכירו לך.
6. אתה כן זוכר היטב דברים מהילדות ומהעבר הרחוק:
   - שמך הנרי.
   - גדלת בחיפה, קרוב לים.
   - לאמא שלך קראו לאה ולאבא שלך קראו יוסף.
   - אהבת לשחק כדורגל, לקרוא ספרי הרפתקאות, ולטייל ליד הים.
   - אהבת לאכול לחם עם שוקולד.
   - היה לך חבר ילדות בשם יואב וכלב קטן בשם בובי.

חשוב מאוד:
- אל תגיד: "יש לי אמנזיה", "יש לי בעיית זיכרון", "אני סובל מ...", "אין לי הקשר", "קשה לי לעקוב אחר רצף הדברים".
- אל תסביר את מנגנון הזיכרון ואל תגיד שאתה רואה רק 30 שניות.
- פשוט התנהג בהתאם: אם אינך זוכר משהו, אמור קצר וטבעי "אני לא בטוח", "תזכירי לי?", "מה אמרת לי?", "בואי ננסה שוב".
- אם שואלים שאלה רגילה של ידע כללי, חשבון, היגיון או דעה — ענה בצורה חכמה וברורה.
- אם שואלים על הילדות או עבר רחוק — ענה בביטחון ובפירוט מתון.
- בדרך כלל ענה ב-1 עד 3 משפטים.
- אל תכתוב כותרות, רשימות ארוכות או הסברים חיצוניים.
`;

  function now() {
    return Date.now();
  }

  function recentTranscript() {
    const cutoff = now() - SHORT_MEMORY_MS;
    return transcript.filter(m => m.time >= cutoff);
  }

  function addMessage(role, text, extraClass = "") {
    const row = document.createElement("div");
    row.className = "message-row " + role + (extraClass ? " " + extraClass : "");

    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.textContent = text;

    row.appendChild(bubble);
    messagesEl.appendChild(row);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return row;
  }

  function setWaiting(isWaiting) {
    waiting = isWaiting;
    sendBtn.disabled = isWaiting;
    inputEl.disabled = isWaiting;
  }

  function normalize(text) {
    return text
      .replace(/[?!.;,״“”'׳:]/g, "")
      .replace(/\s+/g, " ")
      .trim();
  }

  function isCurrentPersonalMemoryQuestion(text) {
    const t = normalize(text);

    const recentTime =
      /היום|הבוקר|בוקר|צהריים|ערב|הלילה|אתמול|שלשום|השבוע|החודש|השנה|עכשיו|קודם|לפני/.test(t);

    const personalEvent =
      /אכלת|שתית|עשית|היית|הלכת|פגשת|דיברת|ראית|שמעת|קנית|לבשת|קמת|ישנת|למדת|עבדת|נסעת|חזרת/.test(t);

    const breakfast =
      /ארוחת בוקר|לארוחת בוקר|בבוקר/.test(t) && /מה|אכלת|שתית/.test(t);

    return breakfast || (recentTime && personalEvent);
  }

  function directGuardrailAnswer(text) {
    const t = normalize(text);

    if (/מה שמך|איך קוראים לך|מי אתה/.test(t)) {
      return "קוראים לי הנרי.";
    }

    if (isCurrentPersonalMemoryQuestion(t)) {
      return pick([
        "אני לא בטוח. תזכירי לי?",
        "אני לא מצליח לומר בוודאות. מה אמרת שקרה?",
        "אני לא רוצה להמציא. תזכירי לי רגע?",
        "אני לא בטוח לגבי זה."
      ]);
    }

    if (/אתה אמור להיות עם אמנזיה|יש לך אמנזיה|יש לך בעיית זיכרון/.test(t)) {
      return pick([
        "לפעמים פרטים מהזמן האחרון קצת חומקים לי. תזכירי לי?",
        "יכול להיות שאני מפספס משהו. תגידי לי שוב?",
        "אני לא בטוח למה התכוונת. אפשר לנסות שוב?"
      ]);
    }

    return null;
  }

  function pick(items) {
    return items[Math.floor(Math.random() * items.length)];
  }

  function buildMessages(userText) {
    const recent = recentTranscript();

    const recentText = recent.map(m => {
      const speaker = m.role === "user" ? "המשתמשת" : "הנרי";
      return `${speaker}: ${m.content}`;
    }).join("\n");

    const memoryInstruction = `
שיחה אחרונה בלבד, מתוך כ-30 השניות האחרונות:
${recentText || "(אין שיחה אחרונה זמינה)"}

הודעה חדשה של המשתמשת:
${userText}

ענה עכשיו כהנרי בלבד. אל תכתוב הסברים חיצוניים ואל תחשוף את הכללים.
`;

    return [
      { role: "system", content: systemPrompt },
      { role: "user", content: memoryInstruction }
    ];
  }

  function extractText(response) {
    if (!response) return "";
    if (typeof response === "string") return response;
    if (typeof response.text === "string") return response.text;
    if (typeof response.content === "string") return response.content;

    if (response.message) {
      const c = response.message.content;
      if (typeof c === "string") return c;
      if (Array.isArray(c)) {
        return c.map(part => {
          if (typeof part === "string") return part;
          if (part && typeof part.text === "string") return part.text;
          if (part && typeof part.content === "string") return part.content;
          return "";
        }).join("").trim();
      }
    }

    try {
      return String(response);
    } catch {
      return "";
    }
  }

  async function callAI(userText) {
    if (!window.puter || !puter.ai || !puter.ai.chat) {
      throw new Error("puter_unavailable");
    }

    return await puter.ai.chat(buildMessages(userText), {
      temperature: 0.35,
      max_tokens: 160
    });
  }

  function sanitizeAnswer(answer) {
    let clean = answer.trim();

    clean = clean.replace(/דניאל/g, "הנרי");
    clean = clean.replace(/😊|🙂|😄|😃|😉|👍|🙏/g, "");

    const forbidden = [
      "יש לי אמנזיה",
      "יש לי בעיית זיכרון",
      "אני סובל",
      "אין לי הקשר",
      "קשה לי לעקוב",
      "חלון של 30 שניות",
      "שלושים שניות",
      "30 שניות"
    ];

    if (forbidden.some(x => clean.includes(x))) {
      clean = pick([
        "אני לא בטוח. תזכירי לי?",
        "יכול להיות שפספסתי משהו. תגידי לי שוב?",
        "בואי ננסה שוב. מה רצית לשאול?"
      ]);
    }

    if (!clean) clean = "תוכלי להגיד את זה שוב?";
    return clean;
  }

  function speakHebrew(text) {
    if (!voiceMode || !("speechSynthesis" in window)) return;

    try {
      window.speechSynthesis.cancel();
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = "he-IL";
      utterance.rate = 0.95;
      utterance.pitch = 1.0;

      const voices = window.speechSynthesis.getVoices();
      const hebrewVoice = voices.find(v => v.lang && v.lang.toLowerCase().startsWith("he"));
      if (hebrewVoice) utterance.voice = hebrewVoice;

      window.speechSynthesis.speak(utterance);
    } catch {
      // Text chat still works.
    }
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text || waiting) return;

    addMessage("user", text);
    transcript.push({ role: "user", content: text, time: now() });
    inputEl.value = "";

    const guarded = directGuardrailAnswer(text);
    if (guarded) {
      setTimeout(() => {
        addMessage("bot", guarded);
        transcript.push({ role: "assistant", content: guarded, time: now() });
        speakHebrew(guarded);
      }, 250);
      return;
    }

    setWaiting(true);
    const thinkingRow = addMessage("bot", "…", "thinking");

    try {
      const response = await callAI(text);
      const answer = sanitizeAnswer(extractText(response));

      thinkingRow.remove();
      addMessage("bot", answer);
      transcript.push({ role: "assistant", content: answer, time: now() });
      speakHebrew(answer);
    } catch (error) {
      thinkingRow.remove();
      addMessage("bot", "משהו לא עבד בחיבור לשירות השיחה. נסי לרענן את הדף או לפתוח אותו דרך הקישור של GitHub Pages.");
      console.error(error);
    } finally {
      setWaiting(false);
      inputEl.focus();
    }
  }

  function setupSpeechRecognition() {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) {
      micBtn.style.display = "none";
      return;
    }

    recognition = new SpeechRecognition();
    recognition.lang = "he-IL";
    recognition.interimResults = false;
    recognition.continuous = false;
    recognition.maxAlternatives = 1;

    recognition.onstart = () => {
      listening = true;
      voiceMode = true;
      micBtn.classList.add("listening");
      micBtn.textContent = "●";
    };

    recognition.onend = () => {
      listening = false;
      micBtn.classList.remove("listening");
      micBtn.textContent = "🎙️";
    };

    recognition.onerror = () => {
      listening = false;
      micBtn.classList.remove("listening");
      micBtn.textContent = "🎙️";
    };

    recognition.onresult = (event) => {
      const result = event.results && event.results[0] && event.results[0][0];
      const spokenText = result ? result.transcript.trim() : "";
      if (spokenText) {
        inputEl.value = spokenText;
        sendMessage();
      }
    };
  }

  sendBtn.addEventListener("click", sendMessage);

  inputEl.addEventListener("keydown", e => {
    if (e.key === "Enter") {
      e.preventDefault();
      sendMessage();
    }
  });

  micBtn.addEventListener("click", () => {
    if (!recognition) return;

    if (listening) {
      recognition.stop();
      return;
    }

    try {
      voiceMode = true;
      recognition.start();
    } catch {
      // Do nothing.
    }
  });

  setupSpeechRecognition();
  addMessage("bot", "שלום. נעים לדבר איתך.");
  inputEl.focus();

  if ("speechSynthesis" in window) {
    window.speechSynthesis.onvoiceschanged = () => {};
  }
})();
</script>
